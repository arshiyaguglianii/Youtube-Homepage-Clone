<!DOCTYPE html>
<html>
  <head>
    <title>Position Practice</title>
  </head>

  <body style="
    height: 3000px;
    padding-top: 60px;

  ">
    <div style="
      background-color: black;
      color: white;
      position: fixed;
      top: 10px;
      left: 0px; 
      right: 0;
      top: 0;
      height: 50px;
      z-index: 1;
      ">header</div>

    <div style="
      background-color: green;
      color: white;
      position: fixed;
    ">sidebar</div>

    <div style="
      position: absolute;
      background-color: red;
      color: white;
      z-index: 2;
      top: 60px;
      right: 10px;
    ">absolute</div>


    <div style="
     background-color: lightblue;
     height: 200px;
     width: 200px;
     position: static;
     margin-top: 60px;
     ">div1
    </div>
    <div style="
      background-color: lightpink;
      height: 200px;
      width: 200px;
      position: relative;
     ">div2
    </div>
  </body>
</html>
